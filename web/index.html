<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>LiveRig Visual Sync</title>

    <style>

        body{
            font-family:Arial,Helvetica,sans-serif;
            margin:40px;
        }

        h1{
            margin-bottom:30px;
        }

        .ok{
            color:green;
            font-weight:bold;
        }

        pre{
            background:#f4f4f4;
            padding:15px;
            border-radius:8px;
        }

    </style>

</head>

<body>

<h1>LiveRig Visual Sync</h1>

<div id="status">
Conectando...
</div>

<pre id="state"></pre>

<script>

const status = document.getElementById("status");
const state = document.getElementById("state");

const ws = new WebSocket("ws://" + location.host + "/ws");

ws.onopen = () => {

    status.innerHTML = "🟡 Conectado...";

};

ws.onmessage = (event) => {

    const message = JSON.parse(event.data);

    if(message.type === "playback_state")
    {
        status.innerHTML = "<span class='ok'>🟢 PlaybackState recebido</span>";

        state.textContent =
            JSON.stringify(message.payload, null, 4);
    }

};

ws.onclose = () => {

    status.innerHTML = "🔴 WebSocket desconectado";

};

ws.onerror = () => {

    status.innerHTML = "Erro na conexão";

};

</script>

</body>

</html>
