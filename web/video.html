<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveRig Video Sync</title>

    <style>
        :root {
            color-scheme: dark;
            --bg: #000;
            --text: #f4f4f0;
            --muted: #aeb3aa;
            --accent: #d7ff64;
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            position: relative;
        }

        video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: cover;
        }

        .backdrop {
            position: fixed;
            inset: 0;
            background-image: url("/pano_de_fundo.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .hud {
            position: fixed;
            left: 24px;
            right: 24px;
            bottom: 22px;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 18px;
            align-items: end;
            color: var(--muted);
            text-shadow: 0 2px 10px #000;
        }

        .song {
            min-width: 0;
        }

        .title {
            overflow: hidden;
            color: var(--text);
            font-size: 22px;
            font-weight: 700;
            line-height: 1.2;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .detail {
            margin-top: 4px;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.35;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 150px;
            font-size: 14px;
            line-height: 1.3;
            text-align: right;
        }

        .status::before {
            width: 9px;
            height: 9px;
            margin-right: 9px;
            border-radius: 50%;
            background: var(--accent);
            content: "";
        }

        .status.error::before {
            background: var(--danger);
        }

        .fullscreen-button {
            display: inline-grid;
            place-items: center;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(244, 244, 240, 0.28);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.34);
            color: var(--text);
            cursor: pointer;
            font-size: 22px;
            line-height: 1;
            text-shadow: none;
        }

        .fullscreen-button:hover {
            border-color: rgba(244, 244, 240, 0.56);
            background: rgba(0, 0, 0, 0.52);
        }

        .empty {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            padding: 32px;
            color: var(--muted);
            font-size: clamp(28px, 5vw, 64px);
            font-weight: 700;
            line-height: 1.1;
            text-align: center;
        }

        @media (max-width: 720px) {
            .hud {
                left: 16px;
                right: 16px;
                bottom: 16px;
                grid-template-columns: 1fr auto;
                gap: 8px;
            }

            .status {
                grid-column: 1 / -1;
                grid-row: 2;
                justify-content: flex-start;
                text-align: left;
            }
        }
    </style>
</head>

<body>
    <div class="backdrop" id="backdrop"></div>
    <video id="video" muted playsinline preload="auto"></video>
    <div class="empty" id="empty"></div>

    <aside class="hud">
        <div class="song">
            <div class="title" id="title">LiveRig Video</div>
            <div class="detail" id="detail">Aguardando musica</div>
        </div>
        <div class="status" id="status">Conectando</div>
        <button class="fullscreen-button" id="fullscreenButton" type="button" title="Tela cheia" aria-label="Tela cheia">FS</button>
    </aside>

    <script>
        const video = document.getElementById("video");
        const backdrop = document.getElementById("backdrop");
        const empty = document.getElementById("empty");
        const title = document.getElementById("title");
        const detail = document.getElementById("detail");
        const status = document.getElementById("status");
        const fullscreenButton = document.getElementById("fullscreenButton");

        let playback = {
            playing: false,
            position: 0,
            current_song_id: null,
            current_song_title: null,
        };
        let song = null;
        let loadedSongId = null;
        let loadingSongId = null;
        let receivedAt = performance.now();
        let currentClipIndex = null;

        function setStatus(text, mode) {
            status.textContent = text;
            status.classList.toggle("error", mode === "error");
        }

        function updatePlayback(payload) {
            playback = payload;
            receivedAt = performance.now();

            if (!payload.current_song_id) {
                clearSong();
                return;
            }

            if (payload.current_song_id !== loadedSongId) {
                loadSong(payload.current_song_id);
            }
        }

        async function loadSong(songId) {
            if (!songId || loadingSongId === songId) {
                return;
            }

            loadingSongId = songId;
            setStatus("Carregando");

            try {
                const response = await fetch(`/api/songs/${encodeURIComponent(songId)}/sync`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const nextSong = await response.json();
                if (playback.current_song_id !== songId) {
                    return;
                }

                song = nextSong;
                loadedSongId = songId;
                currentClipIndex = null;
                title.textContent = song.title || playback.current_song_title || "LiveRig Video";
                detail.textContent = song.artist || "";
                setStatus("Conectado");
            } catch (error) {
                song = null;
                loadedSongId = null;
                currentClipIndex = null;
                video.removeAttribute("src");
                video.load();
                showFallback();
                title.textContent = playback.current_song_title || "LiveRig Video";
                detail.textContent = "";
                setStatus("Erro ao carregar", "error");
            } finally {
                loadingSongId = null;
            }
        }

        function clearSong() {
            song = null;
            loadedSongId = null;
            loadingSongId = null;
            currentClipIndex = null;
            video.removeAttribute("src");
            video.load();
            showFallback();
            title.textContent = "LiveRig Video";
            detail.textContent = "Aguardando musica";
        }

        function visualPosition() {
            const base = Number(playback.position) || 0;
            if (!playback.playing) {
                return base;
            }

            return base + ((performance.now() - receivedAt) / 1000);
        }

        function clipIndexAt(position) {
            if (!song || !Array.isArray(song.videos) || song.videos.length === 0) {
                return null;
            }

            for (let i = 0; i < song.videos.length; i += 1) {
                const clip = song.videos[i];
                const start = Number(clip.start) || 0;
                const end = Number(clip.end) || Number(song.duration) || Infinity;
                if (start <= position && position < end) {
                    return i;
                }
            }

            return null;
        }

        function updateVideo(position) {
            const index = clipIndexAt(position);

            if (index === null || !song || !song.videos[index]) {
                currentClipIndex = null;
                video.removeAttribute("src");
                video.load();
                showFallback();
                return;
            }

            const clip = song.videos[index];
            const start = Number(clip.start) || 0;
            const expectedTime = Math.max(0, position - start);

            if (currentClipIndex !== index) {
                currentClipIndex = index;
                video.src = clip.src;
                video.currentTime = expectedTime;
                showVideo();
            }

            const drift = Math.abs(video.currentTime - expectedTime);
            if (Number.isFinite(expectedTime) && drift > 0.25) {
                video.currentTime = expectedTime;
            }

            if (playback.playing) {
                const promise = video.play();
                if (promise) {
                    promise.catch(() => {
                        setStatus("Clique para liberar video", "error");
                    });
                }
            } else if (!video.paused) {
                video.pause();
            }
        }

        function frame() {
            updateVideo(visualPosition());
            requestAnimationFrame(frame);
        }

        function showFallback() {
            video.style.display = "none";
            backdrop.style.display = "block";
            empty.style.display = "none";
        }

        function showVideo() {
            backdrop.style.display = "none";
            video.style.display = "block";
            empty.style.display = "none";
        }

        function connect() {
            const protocol = location.protocol === "https:" ? "wss:" : "ws:";
            const ws = new WebSocket(`${protocol}//${location.host}/ws`);

            ws.onopen = () => {
                setStatus("Conectado");
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                if (message.type === "playback_state") {
                    updatePlayback(message.payload);
                }
            };

            ws.onclose = () => {
                setStatus("Desconectado", "error");
                window.setTimeout(connect, 1000);
            };

            ws.onerror = () => {
                setStatus("Erro de conexao", "error");
            };
        }

        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                } else {
                    await document.documentElement.requestFullscreen();
                }
            } catch (error) {
                setStatus("Tela cheia indisponivel", "error");
            }
        }

        function updateFullscreenButton() {
            const fullscreen = Boolean(document.fullscreenElement);
            fullscreenButton.textContent = fullscreen ? "X" : "FS";
            fullscreenButton.title = fullscreen ? "Sair da tela cheia" : "Tela cheia";
            fullscreenButton.setAttribute(
                "aria-label",
                fullscreen ? "Sair da tela cheia" : "Tela cheia"
            );
        }

        document.addEventListener("click", () => {
            if (playback.playing) {
                video.play().catch(() => {});
            }
        });
        document.addEventListener("fullscreenchange", updateFullscreenButton);
        fullscreenButton.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleFullscreen();
        });

        connect();
        showFallback();
        updateFullscreenButton();
        requestAnimationFrame(frame);
    </script>
</body>

</html>
